<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiCA | Creation Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f7; color: #1d1d1f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .input-glow:focus { box-shadow: 0 0 30px rgba(0, 113, 227, 0.2); outline: none; border-color: #0071e3; }
        .fade-out { animation: fadeOut 0.5s ease-in forwards; }
        .fade-in { animation: fadeIn 1s ease-out forwards; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; display: none; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-3xl w-full text-center relative h-[400px] flex items-center justify-center">
        
        <!-- Input State -->
        <div id="input-state" class="w-full absolute transition-all duration-500">
            <h1 class="text-3xl md:text-5xl font-bold tracking-tight mb-4">What is your hardest asset to create?</h1>
            <p class="text-lg text-gray-500 mb-12">Describe it below. Be specific.</p>
            
            <div class="relative max-w-2xl mx-auto flex flex-col sm:flex-row gap-3">
                <input type="text" id="prompt-input" class="w-full bg-white border border-gray-300 rounded-full px-8 py-4 sm:py-5 text-lg md:text-xl shadow-sm input-glow transition-all" placeholder="e.g., A cinematic video..." autocomplete="off">
                <button onclick="capturePrompt()" class="bg-[#0071e3] text-white px-8 py-4 sm:py-5 rounded-full font-semibold hover:bg-blue-600 transition-colors whitespace-nowrap shadow-md">
                    Submit
                </button>
            </div>
        </div>

        <!-- Success State -->
        <div id="success-state" class="w-full absolute opacity-0 pointer-events-none">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 text-green-500 mb-6">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-4xl md:text-5xl font-bold tracking-tight mb-6 bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">Prompt Captured.</h2>
            <p class="text-xl text-gray-600 max-w-lg mx-auto">
                We have securely logged your request. <br>We will generate this <strong>LIVE</strong> for you in 5 days.
            </p>
        </div>

    </div>

    <!-- VANILLA JS IMPLEMENTATION: Google Forms Fetch -->
    <script>
        function capturePrompt() {
            const input = document.getElementById('prompt-input').value;
            if (!input) return; 

            // 1. Get Email from URL Parameter passed by your email client
            const urlParams = new URLSearchParams(window.location.search);
            const userEmail = urlParams.get('email') || 'Direct Link / Unknown';

            // 2. Prepare Google Form Data
            // REPLACE the URL below with your Google Form action URL
            const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLScRSH40jbklNy-61PZTJ8mUteGecI8D4-HrYU5xqmnytLi1Pw/formResponse";
            
            const formData = new FormData();
            // REPLACE 'entry.123456789' with your actual Google Form entry IDs (See guide below)
            formData.append("entry.735501823", userEmail); 
            formData.append("entry.1119606388", input);

            // 3. Send silently using no-cors (Bypasses Google Form's cross-origin restrictions)
            fetch(formUrl, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                console.log("Successfully routed to Google Forms/Sheets");
            }).catch(err => console.error("Capture Error:", err));

            // 4. UI Transition (Retains the exact look & feel)
            const inputState = document.getElementById('input-state');
            const successState = document.getElementById('success-state');

            inputState.classList.add('fade-out');

            setTimeout(() => {
                successState.classList.remove('opacity-0', 'pointer-events-none');
                successState.classList.add('fade-in');
            }, 500);
        }
        
        // Listen for Enter key
        document.getElementById('prompt-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') capturePrompt();
        });
    </script>
</body>
</html>
